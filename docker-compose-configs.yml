# version: "3"

configs:
  alertmanager_config:
    content: |
      global:
        telegram_api_url: "https://api.telegram.org"
        http_config:
          proxy_from_environment: true
      
      templates:
        - '/etc/alertmanager/templates/*.tmpl'
      
      route:
        group_by:
          - 'alertname'
      
        group_wait: 30s
        group_interval: 1m
        repeat_interval: 3h
        receiver: "black-hole"
        routes:
        - matchers:
          - severity =~ "warning|critical"
          receiver: "telegram"
      receivers:
        - name: "black-hole"
        - name: "telegram"
          telegram_configs:
          - api_url: "https://api.telegram.org"
            send_resolved: true
            disable_notifications: false
            bot_token: '${TELEGRAM_TOKEN}'
            chat_id: ${TELEGRAM_CHAT}
            parse_mode: "HTML"
            message: '{{ template "telegram.srv.message" . }}'
  alertmanager_template:
    content: |
      {{ define "tg-wide" }}{{ range . }}Labels:
          {{ range .Labels.SortedPairs }}{{ .Name | toUpper }}: <b>{{ .Value }}</b>{{ end }}
      Annotations:
          {{ range .Annotations.SortedPairs }}{{ .Name | toUpper }}: {{ .Value }}{{ end }}
      Source: {{ .GeneratorURL }}
      {{ end }}
      {{ end }}
      
      {{ define "tg" }}{{ range . }}{{ .Labels.instance }}: {{ .Annotations.summary }}{{ end }}
      {{ end }} 
      
      {{ define "telegram.srv.message" }}
      {{ if gt (len .Alerts.Firing) 0 }}
      &#x1F525 Status: <b>{{ .Status | toUpper }}</b>
      {{ template "tg" .Alerts.Firing }}
      {{ end }}
      {{ if gt (len .Alerts.Resolved) 0 -}}
      &#x2705 Status: <b>{{ .Status | toUpper }} </b>
      {{ template "tg" .Alerts.Resolved }}
      {{ end }}
      {{ end }}
  nexcloud_init:
    content: |
      chown -R ${WWW_USER_UID}:${WWW_USER_GID} "/var/www/html/data"
      echo "# Nextcloud data directory" > /var/www/html/data/.ncdata
      chown ${WWW_USER_UID}:${WWW_USER_GID} /var/www/html/data/.ncdata
  nginx_config:
    content: |
      upstream example.net {
              server nextcloud:80;
      }
      server {
              server_name example.net;
              listen 80 ;
              access_log /var/log/nginx/access.log vhost;
              # include /etc/nginx/vhost.d/default;
      }
      server {
              resolver 127.0.0.11;
              server_name example.net;
              listen 443 ssl;
              http2  on;
              # proxy_set_header Host $host;
              access_log /var/log/nginx/access.log vhost;
              ssl_session_timeout 5m;
              ssl_session_cache shared:SSL:50m;
              ssl_session_tickets off;
              ssl_certificate /etc/nginx/certs/example.net.crt;
              ssl_certificate_key /etc/nginx/certs/example.net.key;
              ssl_dhparam /etc/nginx/certs/example.net.dhparam.pem;
              ssl_stapling on;
              ssl_stapling_verify on;
              ssl_trusted_certificate /etc/nginx/certs/example.net.chain.pem;
              add_header Strict-Transport-Security "max-age=31536000" always;
              # include /etc/nginx/vhost.d/default;
              client_max_body_size 10000M;
              location / {
                      proxy_pass http://example.net;
              }
              disable_symlinks off;
      }
  tor_config:
    content: |
      HardwareAccel 1
      Log notice stdout
      DNSPort 0.0.0.0:8853
      SocksPort 0.0.0.0:9150
      DataDirectory /var/lib/tor
      UseBridges 1
      # UpdateBridgesFromAuthority 1
      # Install obfs4proxy (lyrebird) to container
      # apk update & apk add obfs4proxy
      ClientTransportPlugin obfs4 exec /usr/bin/lyrebird
      # https://torscan-ru.ntc.party/
      # sed 's/^obfs5 /Bridge obfs4 /g' -i /opt/tor/torrc
      ${TOR_BRIDGES}
  prom_alerts:
    content: |
      groups:
      - name: host
        rules:
      
        - alert: high_cpu_load
          expr: node_load1 > 1.5
          for: 30s
          labels:
            severity: warning
          annotations:
            summary: "Server under high load"
            description: "Docker host is under high load, the avg load 1m is at {{ $$value }}. Reported by instance {{ $$labels.instance }} of job {{ $$labels.job }}."
      
        - alert: high_memory_load
          expr: (sum(node_memory_MemTotal_bytes) - sum(node_memory_MemFree_bytes + node_memory_Buffers_bytes + node_memory_Cached_bytes) ) / sum(node_memory_MemTotal_bytes) * 100 > 85
          for: 30s
          labels:
            severity: warning
          annotations:
            summary: "Server memory is almost full"
            description: "Docker host memory usage is {{ humanize $$value }}%. Reported by instance {{ $$labels.instance }} of job {{ $$labels.job }}."
      
        - alert: high_storage_load_data
          expr: (node_filesystem_size_bytes{mountpoint="${DATA_DIR}"} - node_filesystem_free_bytes{mountpoint="${DATA_DIR}"}) / node_filesystem_size_bytes{mountpoint="${DATA_DIR}"}  * 100 > 85
          for: 30s
          labels:
            severity: warning
          annotations:
            summary: "Server storage is almost full"
            description: "Server storage usage is {{ humanize $$value }}%. Reported by instance {{ $$labels.instance }} of job {{ $$labels.job }}."
      
        - alert: full_storage_load_data
          expr: (node_filesystem_size_bytes{mountpoint="${DATA_DIR}"} - node_filesystem_free_bytes{mountpoint="${DATA_DIR}"}) / node_filesystem_size_bytes{mountpoint="${DATA_DIR}"}  * 100 == 100
          for: 30s
          labels:
            severity: critical
          annotations:
            summary: "Server storage is full"
            description: "Server storage usage is {{ humanize $$value }}%. Reported by instance {{ $$labels.instance }} of job {{ $$labels.job }}."
      
        - alert: high_storage_load_root
          expr: (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_free_bytes{mountpoint="/"}) / node_filesystem_size_bytes{mountpoint="/"}  * 100 > 85
          for: 30s
          labels:
            severity: warning
          annotations:
            summary: "Server storage is almost full"
            description: "Server storage usage is {{ humanize $$value }}%. Reported by instance {{ $$labels.instance }} of job {{ $$labels.job }}."
      
        - alert: full_storage_load_root
          expr: (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_free_bytes{mountpoint="/"}) / node_filesystem_size_bytes{mountpoint="/"}  * 100 == 100
          for: 30s
          labels:
            severity: critical
          annotations:
            summary: "Server storage is full"
            description: "Server storage usage is {{ humanize $$value }}%. Reported by instance {{ $$labels.instance }} of job {{ $$labels.job }}."
      
        - alert: TargetDown
          expr: up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Target {{ $$labels.instance }} down"
            description: "{{ $$labels.instance }} of job {{ $$labels.job }} has been down for more than 1 minute."
      
        - alert: RaidStateWarn
          expr: node_md_disks{device=~"md[0-9]{3}",state!="active"} > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: Host RAID array got not active
            description: "RAID array {{ $$labels.device }} is in degraded state due to one or more disks failures."
      
      - name: certificates
        rules:
      
        - alert: certificate_expiration_warning
          expr: round(ssl_certificate_expiry_seconds / 60 / 60 / 24, 1) < 20
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: Your certificate will expire in 20 days
            description: "Your certificate for <b>{{ $$labels.dns_names }}</b> will expire in 20 days "
      
        - alert: certificate_expiration
          expr: round(ssl_certificate_expiry_seconds / 60 / 60 / 24, 1) < 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: Your certificate is expired
            description: "Your certificate for <b>{{ $$labels.dns_names }}</b> is expired"
      
      - name: docker
        rules:
      
        - alert: ContainerDown_alertmanager
          expr: absent(container_memory_usage_bytes{name="alertmanager"})
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Container <b>alertmanager</b> down"
            description: "Container <b>alertmanager</b> has been down for more than 1 minute."
      
        - alert: ContainerDown_cadvisor
          expr: absent(container_memory_usage_bytes{name="cadvisor"})
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Container <b>cadvisor</b> down"
            description: "Container <b>cadvisor</b> has been down for more than 1 minute."
      
              #  - alert: ContainerDown_dns
              #    expr: absent(container_memory_usage_bytes{name="dns"})
              #    for: 1m
              #    labels:
              #      severity: critical
              #    annotations:
              #      summary: "Container <b>dns</b> down"
              #      description: "Container <b>dns</b> has been down for more than 1 minute."
      
        - alert: ContainerDown_letsencrypt
          expr: absent(container_memory_usage_bytes{name="letsencrypt"})
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Container <b>letsencrypt</b> down"
            description: "Container <b>letsencrypt</b> has been down for more than 1 minute."
      
        - alert: ContainerDown_mysql
          expr: absent(container_memory_usage_bytes{name="mysql"})
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Container <b>mysql</b> down"
            description: "Container <b>mysql</b> has been down for more than 1 minute."
      
        - alert: ContainerDown_nextcloud
          expr: absent(container_memory_usage_bytes{name="nextcloud"})
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Container <b>nextcloud</b> down"
            description: "Container <b>nextcloud</b> has been down for more than 1 minute."
      
        - alert: ContainerDown_nginx_proxy
          expr: absent(container_memory_usage_bytes{name="nginx"})
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Container <b>nginx</b> down"
            description: "Container <b>nginx</b> has been down for more than 1 minute."
      
        - alert: ContainerDown_node-exporter
          expr: absent(container_memory_usage_bytes{name="node-exporter"})
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Container <b>node-exporter</b> down"
            description: "Container <b>node-exporter</b> has been down for more than 1 minute."
      
        - alert: ContainerDown_plex
          expr: absent(container_memory_usage_bytes{name="plex"})
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Container <b>plex</b> down"
            description: "Container <b>plex</b> has been down for more than 1 minute."
      
        - alert: ContainerDown_redis
          expr: absent(container_memory_usage_bytes{name="redis"})
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Container <b>redis</b> down"
            description: "Container <b>redis</b> has been down for more than 1 minute."
      
        - alert: ContainerDown_transmission
          expr: absent(container_memory_usage_bytes{name="transmission"})
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Container <b>transmission</b> down"
            description: "Container <b>transmission</b> has been down for more than 1 minute."
      
        - alert: ContainerDown_prometheus
          expr: absent(container_memory_usage_bytes{name="prometheus"})
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Container <b>prometheus</b> down"
            description: "Container <b>prometheus</b> has been down for more than 1 minute."
      
      - name: backup
        rules:
        - alert: Backup_Status_False
          expr: backup_status == 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Backup <b>{{ $$labels.exported_instance }}</b> failed"
            description: "Backup on <b>{{ $$labels.exported_instance }}</b> is failed"
        
  prom_config:
    content: |
      global:
        scrape_interval: 1m
        scrape_timeout: 1m
      
      alerting:
        alertmanagers:
          - static_configs:
              - targets:
                  - "alertmanager:9093"
      rule_files:
        - "alerts.yml"
      
      scrape_configs:
        - job_name: "prometheus"
          static_configs:
          - targets: ["localhost:9090"]
      
        - job_name: "pushgateway"
          metrics_path: /metrics
          scheme: http
          static_configs:
          - targets: ["pushgateway:9091"]
      
        - job_name: "node"
          enable_http2: false
          tls_config:
            insecure_skip_verify: true
          static_configs:
          - targets: ["node-exporter:9100"]
      
        - job_name: "node-cert"
          enable_http2: false
          tls_config:
            insecure_skip_verify: true
          static_configs:
          - targets: ["node-cert-exporter:9117"]
      
        - job_name: "docker"
          static_configs:
          - targets: ["172.17.0.1:9323"]
      
        - job_name: 'cadvisor'
          static_configs:
            - targets: ['cadvisor:8080']

